<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>smart renovation dubai — design-build studio</title>
<meta name="description" content="Dubai renovations, delivered on time — every time. Design-build studio for villas, apartments and offices." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --ink:#111110;
    --bone:#ffffff;
    --paper:#f4f2ed;
    --muted:#8a8680;
    --line:rgba(17,17,16,0.10);
    --sans:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --pad-x:40px;
    --section:140px;
    --max:1600px;
  }
  html.dark{
    --ink:#efe9dd;
    --bone:#0a0908;
    --paper:#141210;
    --muted:rgba(239,233,221,0.55);
    --line:rgba(255,255,255,0.14);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bone);color:var(--ink);font-family:var(--sans);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background .4s ease,color .4s ease}
  img{display:block;max-width:100%;height:auto}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;padding:0}
  input,textarea,select{font-family:inherit;color:inherit}
  ::selection{background:var(--ink);color:var(--bone)}

  .container{max-width:var(--max);margin:0 auto;padding:0 var(--pad-x)}
  .section{padding:var(--section) 0}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .display{font-weight:400;letter-spacing:-.03em;line-height:1.02}
  .h1{font-size:clamp(44px,7.4vw,116px)}
  .h2{font-size:clamp(36px,5.2vw,80px);font-weight:400;letter-spacing:-.025em;line-height:1.04;margin:0}
  .lede{font-size:clamp(16px,1.4vw,20px);color:var(--muted);max-width:60ch;line-height:1.55}
  .muted{color:var(--muted)}
  .rule{height:1px;background:var(--line);width:100%;border:0;margin:0}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.55em;height:52px;padding:0 26px;border-radius:999px;font-size:15px;font-weight:500;letter-spacing:-.005em;transition:background .25s ease,color .25s ease,border-color .25s ease,transform .25s ease}
  .btn-ink{background:var(--ink);color:var(--bone)}
  .btn-ink:hover{background:transparent;color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
  .btn-bone{background:var(--bone);color:var(--ink)}
  .btn-bone:hover{background:transparent;color:var(--bone);box-shadow:inset 0 0 0 1px var(--bone)}
  .btn-ghost{background:transparent;color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
  .btn-ghost:hover{box-shadow:inset 0 0 0 1px var(--ink)}
  .btn-sm{height:42px;padding:0 18px;font-size:13.5px}

  /* nav */
  .nav{position:sticky;top:0;z-index:60;background:color-mix(in srgb,var(--bone) 78%,transparent);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid var(--line)}
  .nav-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:74px;gap:24px}
  .nav-left{display:flex;gap:34px;align-items:center;justify-self:start}
  .nav-left a{font-size:14.5px;color:var(--muted);transition:color .2s}
  .nav-left a:hover{color:var(--ink)}
  .brand{font-size:15px;font-weight:500;letter-spacing:-.01em;display:inline-flex;align-items:center;gap:12px;justify-self:center;white-space:nowrap}
  .brand-mark{width:38px;height:38px;flex:none;display:block}
  html.dark .brand-mark .ring-bg{fill:#0a0908}
  .footer-mark{width:30px;height:30px;flex:none;vertical-align:middle;margin-right:10px}
  .nav-right{display:flex;align-items:center;gap:14px;justify-self:end}
  .nav-phone{font-family:var(--mono);font-size:13px;color:var(--muted)}
  @media (max-width:860px){
    .nav-row{grid-template-columns:auto 1fr auto}
    .nav-left,.nav-phone{display:none}
  }

  /* hero */
  .hero{padding:120px 0 80px;text-align:center}
  .hero-inner{max-width:980px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
  .badge{display:inline-flex;align-items:center;gap:10px;padding:8px 14px;border-radius:999px;border:1px solid var(--line);font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--ink)}
  .badge .pulse{width:7px;height:7px;border-radius:999px;background:#1f6f3f;position:relative}
  .badge .pulse::after{content:"";position:absolute;inset:-4px;border-radius:999px;border:1px solid #1f6f3f;opacity:.4;animation:pulse 2s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.6);opacity:0}}
  .hero h1{margin:28px 0 28px}
  .hero .lede{margin:0 auto 40px}
  .lead-form{display:flex;align-items:center;gap:10px;width:100%;max-width:520px;border:1px solid var(--line);border-radius:999px;padding:6px 6px 6px 22px;background:var(--bone);transition:border-color .2s;margin:0 auto}
  .lead-form:focus-within{border-color:var(--ink)}
  .lead-form input{flex:1;border:0;background:transparent;outline:none;height:44px;font-size:16px;color:var(--ink)}
  .lead-form input::placeholder{color:var(--muted)}
  .micro{font-size:12.5px;color:var(--muted);margin-top:16px;font-family:var(--mono);letter-spacing:.02em}

  /* hero photo */
  .hero-photo{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--paper)}
  .hero-photo img{width:100%;height:100%;object-fit:cover;transition:transform 1.2s ease-out}
  .hero-photo:hover img{transform:scale(1.02)}
  .hero-photo-meta{position:absolute;left:24px;bottom:20px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:#fff;text-transform:uppercase;mix-blend-mode:difference}

  /* trust bar */
  .trust{padding:60px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .trust-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:32px}
  .press{display:flex;flex-wrap:wrap;gap:44px;align-items:center}
  .press span{font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:.04em}
  .licenses{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .stat{padding:60px 32px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:0}
  .stat-num{font-size:clamp(40px,4.6vw,68px);font-weight:300;letter-spacing:-.03em;line-height:1;margin-bottom:14px}
  .stat-label{font-size:14px;color:var(--muted);max-width:18ch}
  @media (max-width:880px){.stats{grid-template-columns:repeat(2,1fr)}.stat{border-right:0;border-bottom:1px solid var(--line)}.stat:nth-child(2n){border-right:0}}

  /* section header */
  .sec-head{display:flex;justify-content:space-between;align-items:end;gap:40px;margin-bottom:64px;flex-wrap:wrap}
  .sec-head .eyebrow{margin-bottom:18px}
  .sec-head .h2{max-width:18ch}

  /* works */
  .works-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:64px 48px}
  .work{display:block}
  .work .photo{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--paper);margin-bottom:22px}
  .work .photo img{width:100%;height:100%;object-fit:cover;transition:transform 1.2s ease-out}
  .work:hover .photo img{transform:scale(1.02)}
  .work-meta{display:flex;justify-content:space-between;gap:24px;align-items:start}
  .work-title{font-size:22px;font-weight:500;letter-spacing:-.01em;margin-bottom:6px}
  .work-loc{font-size:13.5px;color:var(--muted)}
  .work-spec{text-align:right;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.03em;line-height:1.7}
  .work-spec b{color:var(--ink);font-weight:500}
  .work-cta{margin-top:14px;font-size:13.5px;color:var(--ink);border-bottom:1px solid var(--ink);padding-bottom:2px;display:inline-block}
  .see-all{margin-top:72px;display:flex;justify-content:center}
  @media (max-width:860px){.works-grid{grid-template-columns:1fr;gap:48px}}

  /* services */
  .services{background:var(--paper)}
  .svc-list{border-top:1px solid var(--line)}
  .svc{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:32px;align-items:center;padding:36px 0;border-bottom:1px solid var(--line);transition:padding .35s ease}
  .svc:hover{padding-left:14px;padding-right:14px}
  .svc-name{font-size:clamp(22px,2.2vw,30px);font-weight:400;letter-spacing:-.015em}
  .svc-price,.svc-dur{font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:.03em}
  .svc-price b{color:var(--ink);font-weight:500}
  @media (max-width:860px){.svc{grid-template-columns:1fr;gap:8px;padding:28px 0}.svc-cta{justify-self:start;margin-top:8px}}

  /* process */
  .process-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--line)}
  .step{padding:48px 36px 56px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .step:last-child{border-right:0}
  .step-num{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.06em;margin-bottom:36px}
  .step-name{font-size:24px;font-weight:500;letter-spacing:-.01em;margin-bottom:8px}
  .step-dur{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:22px;letter-spacing:.04em}
  .step-body{font-size:15px;color:var(--muted);line-height:1.55}
  @media (max-width:980px){.process-grid{grid-template-columns:repeat(2,1fr)}.step:nth-child(2n){border-right:0}}
  @media (max-width:560px){.process-grid{grid-template-columns:1fr}.step{border-right:0}}

  /* testimonials */
  .quotes{display:grid;grid-template-columns:repeat(3,1fr);gap:48px;border-top:1px solid var(--line);padding-top:56px}
  .quote p{font-size:20px;line-height:1.45;letter-spacing:-.01em;font-weight:400;margin:0 0 28px}
  .quote-by{font-size:13.5px}
  .quote-by b{font-weight:500}
  .quote-by span{display:block;color:var(--muted);font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;margin-top:4px}
  .google{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-top:64px;padding-top:32px;border-top:1px solid var(--line)}
  .google-rating{display:flex;align-items:baseline;gap:14px}
  .google-rating b{font-size:36px;font-weight:300;letter-spacing:-.02em}
  .google-rating span{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em}
  @media (max-width:860px){.quotes{grid-template-columns:1fr;gap:40px}}

  /* faq */
  .faq{max-width:980px;margin:0 auto}
  .faq-item{border-top:1px solid var(--line)}
  .faq-item:last-child{border-bottom:1px solid var(--line)}
  .faq-q{display:flex;justify-content:space-between;align-items:center;width:100%;padding:32px 0;text-align:left;font-size:clamp(18px,1.6vw,22px);font-weight:400;letter-spacing:-.01em}
  .faq-q .plus{font-family:var(--mono);font-size:18px;color:var(--muted);transition:transform .3s ease}
  .faq-item.open .faq-q .plus{transform:rotate(45deg);color:var(--ink)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .45s ease,padding .35s ease;color:var(--muted);font-size:16px;line-height:1.55;max-width:62ch}
  .faq-item.open .faq-a{max-height:280px;padding:0 0 36px}

  /* final cta */
  .final{background:var(--ink);color:var(--bone);padding:160px 0}
  .final .eyebrow{color:rgba(255,255,255,.55)}
  .final h2{font-size:clamp(48px,7vw,108px);font-weight:400;letter-spacing:-.03em;line-height:1.02;margin:18px 0 32px;max-width:14ch}
  .final .lede{color:rgba(255,255,255,.65);max-width:54ch;margin-bottom:44px}
  .final-cta{display:flex;gap:14px;flex-wrap:wrap}
  .final-micro{margin-top:22px;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.04em}

  /* footer */
  .foot{padding:42px 0;border-top:1px solid var(--line)}
  .foot-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .foot-row a{margin-left:22px}
  .foot-row a:hover{color:var(--ink)}

  /* sticky cta */
  .sticky{position:fixed;right:24px;bottom:24px;z-index:55;opacity:0;transform:translateY(16px);pointer-events:none;transition:opacity .35s ease,transform .35s ease}
  .sticky.show{opacity:1;transform:translateY(0);pointer-events:auto}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(10,9,8,.5);backdrop-filter:blur(6px);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s ease}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{background:var(--bone);color:var(--ink);max-width:560px;width:100%;padding:48px 44px;border-radius:4px;transform:translateY(12px);transition:transform .35s ease}
  .scrim.show .modal{transform:translateY(0)}
  .modal h3{font-size:32px;font-weight:400;letter-spacing:-.02em;margin:0 0 8px}
  .modal p.sub{color:var(--muted);font-size:15px;margin:0 0 28px}
  .field{margin-bottom:16px}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .field input,.field select{width:100%;height:48px;border:1px solid var(--line);border-radius:6px;padding:0 14px;background:var(--bone);font-size:15px;outline:none;transition:border-color .2s}
  .field input:focus,.field select:focus{border-color:var(--ink)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .modal-foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:14px;flex-wrap:wrap}
  .modal-foot .micro{margin:0}
  .modal-close{position:absolute;top:18px;right:22px;font-family:var(--mono);font-size:14px;color:var(--muted)}
  .modal-wrap{position:relative}
  .thanks{text-align:center;padding:30px 10px}
  .thanks h3{margin-bottom:14px}
  .thanks p{color:var(--muted);max-width:42ch;margin:0 auto 28px}

  /* tweaks panel */
  .tweaks{position:fixed;left:24px;bottom:24px;z-index:55;display:flex;align-items:center;gap:10px;background:var(--bone);border:1px solid var(--line);border-radius:999px;padding:6px 8px 6px 14px;font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .tweaks .sw{position:relative;width:38px;height:22px;border-radius:999px;background:var(--paper);border:1px solid var(--line);cursor:pointer}
  .tweaks .sw .knob{position:absolute;top:1px;left:1px;width:18px;height:18px;border-radius:999px;background:var(--ink);transition:transform .25s ease}
  html.dark .tweaks .sw .knob{transform:translateX(16px)}

  /* reveal */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity 1.1s cubic-bezier(.2,.8,.2,1),transform 1.1s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:translateY(0)}

  @media (max-width:680px){
    :root{--pad-x:20px;--section:96px}
    .hero{padding:64px 0 40px}
    .nav-row{height:64px}
    .modal{padding:36px 24px}
    .row2{grid-template-columns:1fr}
    .final{padding:120px 0}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ---------- data ---------- */
const WORKS = [
  { title:"emirates hills villa", loc:"Emirates Hills · 8,400 sqft", img:"https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=1600&q=80&auto=format&fit=crop", budget:"AED 6.2M", time:"7 months" },
  { title:"downtown sky residence", loc:"Burj Khalifa District · 3,200 sqft", img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1600&q=80&auto=format&fit=crop", budget:"AED 1.8M", time:"4 months" },
  { title:"al barari garden home", loc:"Al Barari · 5,600 sqft", img:"https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=1600&q=80&auto=format&fit=crop", budget:"AED 3.9M", time:"6 months" },
  { title:"difc creative office", loc:"DIFC Gate Avenue · 4,100 sqft", img:"https://images.unsplash.com/photo-1497366216548-37526070297c?w=1600&q=80&auto=format&fit=crop", budget:"AED 2.4M", time:"5 months" },
];

const SERVICES = [
  { name:"villa renovation", from:"AED 2.5M", dur:"6–9 months" },
  { name:"apartment renovation", from:"AED 450K", dur:"3–5 months" },
  { name:"kitchen design", from:"AED 280K", dur:"8–12 weeks" },
  { name:"bathroom & spa", from:"AED 180K", dur:"6–10 weeks" },
  { name:"office fit-out", from:"AED 1.2M", dur:"4–6 months" },
  { name:"landscape & outdoor", from:"AED 350K", dur:"3–5 months" },
];

const PROCESS = [
  { name:"discovery call", dur:"45 min", body:"A free conversation about your property, goals, and budget. No commitment." },
  { name:"fixed-price quote", dur:"7 days", body:"Full scope, material palette, timeline, and locked price — delivered in writing." },
  { name:"design & approvals", dur:"6–12 weeks", body:"Concepts, visualisations, municipality submissions — handled for you." },
  { name:"build & handover", dur:"3–9 months", body:"Weekly progress updates, on-site QA, on-time keys. Guaranteed." },
];

const QUOTES = [
  { text:"They quoted in six days, started in three weeks, and handed over the villa two days early. Unheard of in Dubai.", by:"Layla H.", meta:"Emirates Hills · AED 6.2M villa" },
  { text:"One team handled design, permits, and build. We never had to chase a contractor or a consultant once.", by:"Marc R.", meta:"DIFC office fit-out · AED 2.4M" },
  { text:"The fixed price held to the dirham. Weekly site walks, transparent reporting, no surprises at handover.", by:"Aisha & Omar K.", meta:"Downtown apartment · AED 1.8M" },
];

const FAQS = [
  { q:"How long does a typical renovation take?", a:"Apartments: 3–5 months. Villas: 6–9 months. Commercial: 4–6 months. We lock the timeline in the contract and hit 98% of dates." },
  { q:"How do you price? Will there be surprises?", a:"Fixed-price quote within 7 days of the site visit. No hidden extras, no change-order games. If we miss, we cover it." },
  { q:"Do you handle permits, RERA and DCD approvals?", a:"Yes — we are RERA, DED and Dubai Civil Defence licensed. Permits, NOCs and municipality submissions managed end-to-end." },
  { q:"Can I stay in my home during the renovation?", a:"Usually not for villas and full-apartment jobs. We sequence partial renovations so you can stay when possible — confirmed at design phase." },
  { q:"What's the smallest project you take?", a:"A single kitchen or bathroom, typically starting at AED 180K. We do not take purely decorative work." },
];

/* ---------- reveal hook ---------- */
function useReveal(){
  useEffect(()=>{
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver(es=>{
      es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    },{threshold:.12});
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);
}

/* ---------- logo (inline svg) ---------- */
function Logo({ className="brand-mark", id="lg" }){
  const pathId = id+"-arc";
  return (
    <svg className={className} viewBox="0 0 120 120" role="img" aria-label="smart renovation" xmlns="http://www.w3.org/2000/svg">
      {/* outer ring: green left half + red right half */}
      <path d="M 60,4 A 56,56 0 0,0 60,116 Z" fill="#1f7a3a"/>
      <path d="M 60,4 A 56,56 0 0,1 60,116 Z" fill="#d2342c"/>
      {/* white inner disc carving the ring */}
      <circle className="ring-bg" cx="60" cy="60" r="48" fill="#ffffff"/>
      {/* curved text path (full circle, clockwise from top) */}
      <defs>
        <path id={pathId} d="M 60,18 a 42,42 0 1,1 -0.001,0" fill="none"/>
      </defs>
      <text fill="#111110" fontFamily="Inter, sans-serif" fontSize="7.6" fontWeight="700" letterSpacing="1.6">
        <textPath href={"#"+pathId} startOffset="0">SMART · RENOVATION · SMART · RENOVATION ·</textPath>
      </text>
      {/* house silhouette */}
      <g transform="translate(60,62)" fill="#111110">
        <path d="M -17,-3 L 0,-20 L 17,-3 L 17,16 L -17,16 Z"/>
        <rect x="-4.5" y="3" width="9" height="13" fill="#ffffff"/>
      </g>
    </svg>
  );
}

/* ---------- components ---------- */
function Nav({ onBook }){
  return (
    <header className="nav">
      <div className="container nav-row">
        <nav className="nav-left">
          <a href="#services">studio</a>

function Modal({ open, onClose }){
  const [done,setDone] = useState(false);
  useEffect(()=>{ if(!open) setDone(false); },[open]);
  if(!open && !done) return null;
  const submit = (e)=>{ e.preventDefault(); setDone(true); };
  return (
    <div className={"scrim"+(open?" show":"")} onMouseDown={(e)=>{ if(e.target.classList.contains('scrim')) onClose(); }}>
      <div className="modal-wrap" style={{maxWidth:560,width:'100%'}}>
        <div className="modal">
          <button className="modal-close" onClick={onClose}>close ✕</button>
          {!done ? (
            <>
              <h3>book a 45-min consultation.</h3>
              <p className="sub">free · no obligation · reply within 24h</p>
              <form onSubmit={submit}>
                <div className="row2">
                  <div className="field"><label>full name</label><input required placeholder="your name"/></div>
                  <div className="field"><label>phone</label><input required placeholder="+971 …"/></div>
                </div>
                <div className="field"><label>email</label><input type="email" required placeholder="you@domain.com"/></div>
                <div className="row2">
                  <div className="field"><label>project type</label>
                    <select required defaultValue=""><option value="" disabled>select…</option>
                      <option>villa renovation</option><option>apartment renovation</option>
                      <option>kitchen</option><option>bathroom & spa</option>
                      <option>office fit-out</option><option>landscape & outdoor</option>
                    </select>
                  </div>
                  <div className="field"><label>budget range</label>
                    <select required defaultValue=""><option value="" disabled>select…</option>
                      <option>aed 180k – 500k</option><option>aed 500k – 1.5m</option>
                      <option>aed 1.5m – 3m</option><option>aed 3m+</option>
                    </select>
                  </div>
                </div>
                <div className="modal-foot">
                  <p className="micro">we reply within 24h · no sales pressure</p>
                  <button type="submit" className="btn btn-ink">send request →</button>
                </div>
              </form>
            </>
          ) : (
            <div className="thanks">
              <h3>request received.</h3>
              <p>we will reply within 24 hours with a confirmed slot for your consultation. check your inbox — including spam, just in case.</p>
              <button className="btn btn-ghost" onClick={onClose}>close</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Tweaks(){
  const [dark,setDark] = useState(false);
  useEffect(()=>{ document.documentElement.classList.toggle('dark', dark); },[dark]);
  return (
    <div className="tweaks">
      <span>dark</span>
      <div className="sw" onClick={()=>setDark(!dark)}><div className="knob"/></div>
    </div>
  );
}

/* ---------- app ---------- */
function App(){
  const [open,setOpen] = useState(false);
  const [scrolled,setScrolled] = useState(false);
  useReveal();
  useEffect(()=>{
    const onScroll = ()=> setScrolled(window.scrollY > window.innerHeight*0.9);
    window.addEventListener('scroll', onScroll, { passive:true });
    return ()=> window.removeEventListener('scroll', onScroll);
  },[]);
  useEffect(()=>{
    document.body.style.overflow = open ? 'hidden' : '';
  },[open]);
  const book = ()=> setOpen(true);
  return (
    <>
      <Nav onBook={book}/>
      <Hero onBook={book}/>
      <div className="container reveal" style={{padding:'0 var(--pad-x)'}}><HeroPhoto/></div>
      <div style={{height:96}}/>
      <TrustBar/>
      <div style={{height:96}}/>
      <Stats/>
      <Works/>
      <Services onBook={book}/>
      <Process/>
      <Testimonials/>
      <FAQ/>
      <FinalCTA onBook={book}/>
      <Footer/>
      <StickyCTA onBook={book} show={scrolled}/>
      <Tweaks/>
      <Modal open={open} onClose={()=>setOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
